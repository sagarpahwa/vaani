<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaani Reference Delivery POC</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; padding: 40px 20px 80px; }
    .container { max-width: 900px; margin: 0 auto; }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .sub { color: #666; margin-top: 4px; font-size: 0.88rem; }
    .disclaimer { display: inline-block; margin-top: 10px; font-size: 0.76rem; color: #888; font-style: italic; padding: 3px 10px; background: #f0f0ec; border-radius: 4px; }
    .header { margin-bottom: 28px; }

    /* ── Top-level tab bar ─────────────────────────────────────────── */
    .top-tabs { display: flex; gap: 0; border-bottom: 2px solid #e5e5e0; margin-bottom: 28px; }
    .top-tab { padding: 10px 22px; font-size: 0.9rem; font-weight: 600; color: #888; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .top-tab:hover { color: #444; }
    .top-tab.active { color: #111; border-bottom-color: #111; }

    .card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 22px; margin-bottom: 18px; }
    .card-title { font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #999; margin-bottom: 12px; }

    textarea { width: 100%; min-height: 260px; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; line-height: 1.75; resize: vertical; background: #fafaf8; color: #1a1a1a; outline: none; font-family: inherit; transition: border-color 0.15s; }
    textarea:focus { border-color: #888; background: #fff; }
    .char-row { display: flex; justify-content: flex-end; margin-top: 5px; }
    .char-count { font-size: 0.74rem; color: #bbb; }
    .char-count.warn { color: #d97706; }
    .char-count.over { color: #dc2626; font-weight: 600; }

    .controls-row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
    .select-group { display: flex; flex-direction: column; gap: 4px; }
    .select-label { font-size: 0.7rem; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; }
    select { padding: 8px 11px; border: 1px solid #ddd; border-radius: 7px; font-size: 0.86rem; background: #fff; color: #1a1a1a; cursor: pointer; outline: none; }
    select:focus { border-color: #888; }
    select:disabled { opacity: 0.45; }
    .check-group { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; padding-bottom: 2px; }
    .check-group input { width: 14px; height: 14px; cursor: pointer; accent-color: #6366f1; }
    .check-group span { font-size: 0.86rem; color: #444; }
    .spacer { flex: 1; }
    .btn-primary { padding: 10px 22px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    .btn-primary:hover:not(:disabled) { opacity: 0.8; }
    .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-secondary { padding: 7px 14px; background: #f5f5f3; border: 1px solid #e0e0dc; border-radius: 7px; font-size: 0.8rem; font-weight: 600; color: #333; cursor: pointer; transition: background 0.1s; white-space: nowrap; }
    .btn-secondary:hover:not(:disabled) { background: #ebebea; }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-regen { padding: 7px 14px; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 7px; font-size: 0.8rem; font-weight: 600; color: #3730a3; cursor: pointer; transition: background 0.1s; white-space: nowrap; }
    .btn-regen:hover:not(:disabled) { background: #e0e7ff; }
    .btn-regen:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-box { padding: 13px 16px; background: #fff5f5; border: 1px solid #fca5a5; border-radius: 8px; color: #b91c1c; font-size: 0.86rem; margin-bottom: 18px; }
    .warn-box  { padding: 10px 14px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; color: #92400e; font-size: 0.82rem; margin-bottom: 14px; }
    .info-box  { padding: 10px 14px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; color: #1e40af; font-size: 0.82rem; margin-bottom: 14px; }

    /* Progress */
    .progress-card { border-left: 3px solid #6366f1; }
    .take-pills { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
    .take-pill { padding: 3px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 600; background: #f0f0ee; color: #999; }
    .take-pill.active { background: #6366f1; color: #fff; }
    .take-pill.done { background: #d1fae5; color: #065f46; }
    .progress-step { font-size: 0.88rem; color: #444; margin-bottom: 10px; }
    .progress-bar-wrap { background: #f0f0ee; border-radius: 4px; height: 5px; overflow: hidden; margin-bottom: 7px; }
    .progress-bar { height: 100%; background: #6366f1; border-radius: 4px; transition: width 0.3s ease; }
    .progress-meta { font-size: 0.76rem; color: #999; }

    /* Meta row */
    .meta-row { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.79rem; color: #666; margin-bottom: 18px; }
    .meta-row strong { color: #1a1a1a; }

    /* Take card */
    .take-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .take-header { padding: 13px 20px; border-bottom: 1px solid #f0f0ee; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .take-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .take-a .take-dot { background: #94a3b8; }
    .take-b .take-dot { background: #60a5fa; }
    .take-c .take-dot { background: #f97316; }
    .take-name { font-size: 0.94rem; font-weight: 600; }
    .take-meta { margin-left: auto; font-size: 0.74rem; color: #bbb; }
    .take-body { padding: 16px 20px; }
    .regen-banner { font-size: 0.73rem; color: #6366f1; background: #eef2ff; padding: 4px 10px; border-radius: 4px; margin-bottom: 10px; display: inline-block; }

    .audio-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    audio { flex: 1; min-width: 200px; }
    .btn-download { padding: 7px 14px; background: #f5f5f3; border: 1px solid #e0e0dc; border-radius: 7px; font-size: 0.8rem; font-weight: 600; color: #333; text-decoration: none; white-space: nowrap; transition: background 0.1s; }
    .btn-download:hover { background: #ebebea; }

    /* Diagnostics */
    .diag-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .score-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
    .score-good { background: #d1fae5; color: #065f46; }
    .score-ok   { background: #fef3c7; color: #92400e; }
    .score-bad  { background: #fee2e2; color: #991b1b; }
    .diag-stat { font-size: 0.78rem; color: #666; }
    .diag-stat strong { color: #1a1a1a; }
    .diag-warnings { margin-top: 6px; }
    .diag-warn { font-size: 0.75rem; color: #b45309; background: #fffbeb; border: 1px solid #fde68a; padding: 4px 10px; border-radius: 5px; margin-bottom: 3px; }

    /* Expand buttons */
    .expand-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
    .btn-expand { padding: 5px 11px; border: 1px solid #e0e0dc; border-radius: 6px; background: #fafaf8; font-size: 0.76rem; color: #555; cursor: pointer; transition: background 0.1s; }
    .btn-expand:hover { background: #f0f0ee; }
    .btn-expand.open { background: #eef2ff; border-color: #c7d2fe; color: #3730a3; }

    /* Beat map table */
    .beat-wrap { margin-top: 12px; }
    .arc-line { font-size: 0.78rem; color: #666; font-style: italic; padding: 7px 11px; background: #fafaf8; border-radius: 6px; margin-bottom: 10px; }
    .table-scroll { overflow-x: auto; max-height: 380px; overflow-y: auto; border: 1px solid #e5e5e0; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
    thead th { position: sticky; top: 0; background: #f5f5f3; padding: 7px 9px; text-align: left; font-weight: 600; color: #666; border-bottom: 1px solid #e5e5e0; white-space: nowrap; }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody td { padding: 6px 9px; vertical-align: top; border-bottom: 1px solid #f0f0ee; }
    .td-idx { color: #bbb; font-size: 0.7rem; width: 26px; }
    .td-text { max-width: 240px; }
    .td-emotion { color: #555; font-style: italic; font-size: 0.74rem; white-space: nowrap; }
    .pace-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.68rem; font-weight: 600; }
    .pace-slow { background: #dcfce7; color: #14532d; }
    .pace-medium { background: #f3f4f6; color: #374151; }
    .pace-fast { background: #dbeafe; color: #1e3a8a; }
    .energy-cell { display: flex; align-items: center; gap: 4px; }
    .e-dot { width: 6px; height: 6px; border-radius: 50%; }
    .e-low  { background: #93c5fd; }
    .e-mid  { background: #9ca3af; }
    .e-high { background: #fb923c; }
    .pause-ms { font-size: 0.73rem; font-weight: 600; border-radius: 4px; padding: 1px 5px; }
    .p-none  { background: #f9fafb; color: #d1d5db; }
    .p-short { background: #f3f4f6; color: #374151; }
    .p-mid   { background: #fef9c3; color: #713f12; }
    .p-long  { background: #fed7aa; color: #7c2d12; }
    .p-xlong { background: #fecaca; color: #7f1d1d; }
    .td-note { max-width: 200px; color: #666; font-style: italic; font-size: 0.72rem; }
    .variant-badge { padding: 1px 6px; border-radius: 3px; font-size: 0.68rem; font-weight: 700; }
    .v-A { background: #e0e7ff; color: #3730a3; }
    .v-B { background: #f0fdf4; color: #14532d; }
    .v-C { background: #fff7ed; color: #7c2d12; }

    /* Perf script */
    .script-wrap { margin-top: 12px; }
    .script-unit { margin-bottom: 4px; }
    .script-text { font-size: 0.87rem; line-height: 1.65; }
    .script-pause { font-size: 0.7rem; color: #94a3b8; padding: 0 0 4px 10px; font-style: italic; }

    /* Files */
    .files-list { list-style: none; margin-top: 7px; }
    .files-list li { font-size: 0.78rem; font-family: 'Menlo', monospace; padding: 5px 10px; background: #fafaf8; border: 1px solid #e5e5e0; border-radius: 5px; margin-bottom: 4px; }
    .files-list a { color: #2563eb; text-decoration: none; }
    .files-list a:hover { text-decoration: underline; }
    .regen-loading { font-size: 0.8rem; color: #6366f1; padding: 8px 0; }

    /* ── Speech Lab ────────────────────────────────────────────────── */

    /* Recording button */
    .record-area { display: flex; flex-direction: column; align-items: center; padding: 28px 0 20px; gap: 16px; }
    .btn-record { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: transform 0.15s, box-shadow 0.15s; }
    .btn-record.idle     { background: #111; color: #fff; box-shadow: 0 4px 18px rgba(0,0,0,0.18); }
    .btn-record.idle:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(0,0,0,0.22); }
    .btn-record.recording { background: #dc2626; color: #fff; box-shadow: 0 0 0 6px rgba(220,38,38,0.18); animation: pulse-rec 1.2s ease-in-out infinite; }
    @keyframes pulse-rec { 0%,100% { box-shadow: 0 0 0 6px rgba(220,38,38,0.18); } 50% { box-shadow: 0 0 0 14px rgba(220,38,38,0.07); } }
    .rec-timer { font-size: 1.6rem; font-variant-numeric: tabular-nums; font-weight: 700; color: #dc2626; letter-spacing: 0.04em; }
    .rec-hint  { font-size: 0.82rem; color: #999; }

    .recorded-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
    .recorded-row audio { flex: 1; min-width: 200px; }

    .btn-analyze { padding: 11px 28px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    .btn-analyze:hover:not(:disabled) { opacity: 0.88; }
    .btn-analyze:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn-rerecord { padding: 9px 16px; background: #f5f5f3; border: 1px solid #e0e0dc; border-radius: 8px; font-size: 0.86rem; font-weight: 600; color: #555; cursor: pointer; }
    .btn-rerecord:hover { background: #ebebea; }

    /* Script read-along */
    .script-readonly { width: 100%; min-height: 180px; max-height: 280px; overflow-y: auto; padding: 14px; border: 1px solid #e5e5e0; border-radius: 8px; font-size: 0.9rem; line-height: 1.75; background: #fafaf8; color: #333; white-space: pre-wrap; }
    .script-locked-badge { display: inline-block; font-size: 0.7rem; font-weight: 600; color: #6366f1; background: #eef2ff; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }

    /* Analysis sub-tabs */
    .sub-tabs { display: flex; gap: 4px; border-bottom: 1px solid #e5e5e0; margin-bottom: 18px; flex-wrap: wrap; }
    .sub-tab { padding: 7px 16px; font-size: 0.8rem; font-weight: 600; color: #888; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; transition: color 0.15s; white-space: nowrap; }
    .sub-tab:hover { color: #444; }
    .sub-tab.active { color: #6366f1; border-bottom-color: #6366f1; }

    /* Overall tab */
    .big-score-wrap { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 18px; flex-wrap: wrap; }
    .big-score { font-size: 3.2rem; font-weight: 800; line-height: 1; }
    .big-score-label { font-size: 0.78rem; color: #888; margin-top: 4px; }
    .overall-feedback { font-size: 0.9rem; line-height: 1.65; color: #333; font-style: italic; margin-top: 10px; }
    .dimensions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .score-bar-row { display: flex; align-items: center; gap: 10px; }
    .score-bar-label { font-size: 0.78rem; font-weight: 600; color: #555; width: 90px; flex-shrink: 0; text-transform: capitalize; }
    .score-bar-track { flex: 1; height: 7px; background: #f0f0ee; border-radius: 4px; overflow: hidden; }
    .score-bar-fill  { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .bar-good { background: #22c55e; }
    .bar-ok   { background: #f59e0b; }
    .bar-bad  { background: #ef4444; }
    .score-bar-value { font-size: 0.76rem; font-weight: 700; width: 30px; text-align: right; color: #333; }

    .align-stat-row { display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.78rem; color: #666; margin-top: 12px; }
    .stat-chip { padding: 3px 10px; border-radius: 20px; font-size: 0.74rem; font-weight: 600; }
    .stat-correct  { background: #dcfce7; color: #14532d; }
    .stat-missing  { background: #fee2e2; color: #991b1b; }
    .stat-extra    { background: #f3f4f6; color: #374151; }
    .stat-sub      { background: #fef9c3; color: #713f12; }
    .stat-accuracy { background: #e0e7ff; color: #3730a3; }
    .stat-asr      { background: #f5f3ff; color: #6d28d9; }

    /* Validity & status badges */
    .validity-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; display: inline-block; }
    .validity-catastrophic { background: #fee2e2; color: #991b1b; }
    .validity-major        { background: #ffedd5; color: #9a3412; }
    .validity-partial      { background: #fef9c3; color: #713f12; }
    .validity-valid        { background: #dcfce7; color: #14532d; }

    .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; flex-shrink: 0; }
    .status-skipped  { background: #f3f4f6; color: #6b7280; }
    .status-partial  { background: #fef9c3; color: #713f12; }
    .status-complete { background: #dcfce7; color: #14532d; }
    .status-short    { background: #f3f4f6; color: #9ca3af; }

    .cap-reason-box { padding: 8px 12px; background: #fffbeb; border-radius: 6px; border-left: 3px solid #f59e0b; font-size: 0.8rem; color: #92400e; margin-top: 8px; }

    /* Transcript diff tab */
    .diff-area { font-size: 0.92rem; line-height: 2.0; padding: 16px; background: #fafaf8; border: 1px solid #e5e5e0; border-radius: 8px; }
    .diff-correct  { color: #15803d; }
    .diff-missing  { color: #dc2626; background: #fee2e2; border-radius: 3px; padding: 0 3px; font-size: 0.8em; text-decoration: line-through; }
    .diff-extra    { color: #9ca3af; font-size: 0.85em; }
    .diff-sub      { display: inline; }
    .diff-sub-exp  { color: #b45309; background: #fef3c7; border-radius: 3px; padding: 0 2px; font-size: 0.8em; text-decoration: line-through; margin-right: 2px; }
    .diff-sub-spo  { color: #1d4ed8; background: #dbeafe; border-radius: 3px; padding: 0 3px; }
    .diff-asr      { color: #6d28d9; background: #f5f3ff; border-radius: 3px; padding: 0 3px; font-style: italic; }
    .diff-legend   { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; font-size: 0.74rem; }
    .diff-legend span { display: flex; align-items: center; gap: 4px; }

    /* Unit feedback tab */
    .unit-feedback-list { display: flex; flex-direction: column; gap: 12px; }
    .unit-fb-card { border: 1px solid #e5e5e0; border-radius: 10px; overflow: hidden; }
    .unit-fb-header { padding: 10px 16px; background: #fafaf8; border-bottom: 1px solid #f0f0ee; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .unit-idx { font-size: 0.7rem; color: #bbb; width: 20px; flex-shrink: 0; }
    .unit-txt { font-size: 0.86rem; color: #333; flex: 1; min-width: 0; }
    .unit-overall { flex-shrink: 0; }
    .unit-fb-body { padding: 12px 16px; }
    .unit-dim-bars { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .unit-feedback-text { font-size: 0.86rem; line-height: 1.6; color: #444; border-left: 3px solid #6366f1; padding-left: 10px; }
    .unit-stats-mini { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; font-size: 0.74rem; color: #888; }

    /* Top-5 fixes tab */
    .fixes-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .fix-item { display: flex; gap: 14px; align-items: flex-start; padding: 12px 16px; background: #fafaf8; border: 1px solid #e5e5e0; border-radius: 8px; }
    .fix-num  { font-size: 1.4rem; font-weight: 800; color: #6366f1; line-height: 1; flex-shrink: 0; width: 28px; }
    .fix-text { font-size: 0.9rem; line-height: 1.6; color: #333; }

    /* Audio compare tab */
    .audio-compare-list { display: flex; flex-direction: column; gap: 16px; }
    .audio-compare-card { border: 1px solid #e5e5e0; border-radius: 10px; overflow: hidden; }
    .audio-compare-header { padding: 10px 16px; background: #fafaf8; border-bottom: 1px solid #f0f0ee; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .audio-compare-body  { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .audio-clip-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .audio-clip-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #888; width: 76px; flex-shrink: 0; }
    .audio-clip-row audio { flex: 1; min-width: 180px; }
    .no-clip { font-size: 0.78rem; color: #ccc; font-style: italic; }

    .prosody-badge { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; background: #f3f4f6; color: #6b7280; }
    .prosody-badge.full { background: #dcfce7; color: #15803d; }

    /* Setup warning */
    .setup-warn code { background: #fef3c7; padding: 1px 6px; border-radius: 3px; font-family: 'Menlo', monospace; font-size: 0.82em; color: #92400e; }

    /* Validity inline during analysis */
    .validity-inline { padding: 8px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; margin-top: 10px; }
    .validity-inline.bad  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .validity-inline.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .validity-inline.ok   { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const DEFAULT_SCRIPT = `Today, we are excited to introduce TinyTrail, a new toy created for children who love to explore, imagine, and learn through play.

TinyTrail is not just a toy you hand to a child. It is a little adventure box. Every piece is designed to help kids build stories, solve small challenges, and create their own world using their hands and imagination.

function pauseClass(ms) {
  if (!ms || ms < 100) return 'p-none';
  if (ms < 550)  return 'p-short';
  if (ms < 1000) return 'p-mid';
  if (ms < 1500) return 'p-long';
  return 'p-xlong';
}
function fmtMs(ms) {
  if (!ms || ms === 0) return '—';
  return ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`;
}
function energyClass(e) { return e <= 3 ? 'e-low' : e <= 6 ? 'e-mid' : 'e-high'; }
function scoreClass(s) { return !s && s !== 0 ? '' : s >= 70 ? 'score-good' : s >= 45 ? 'score-ok' : 'score-bad'; }
function barClass(s)   { return !s && s !== 0 ? '' : s >= 70 ? 'bar-good'   : s >= 45 ? 'bar-ok'   : 'bar-bad'; }
function scoreColor(s) { return s >= 70 ? '#15803d' : s >= 45 ? '#b45309' : '#dc2626'; }
function fmtTime(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function consumeSSE(response, onEvent) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const parts = buf.split('\n\n');
    buf = parts.pop();
    for (const part of parts) {
      if (!part.trim()) continue;
      let evtName = 'message', dataStr = '';
      for (const line of part.split('\n')) {
        if (line.startsWith('event: ')) evtName = line.slice(7).trim();
        else if (line.startsWith('data: ')) dataStr = line.slice(6);
      }
      if (dataStr) try { onEvent(evtName, JSON.parse(dataStr)); } catch {}
    }
  }
}

        <span><span className="diff-sub"><span className="diff-sub-exp">old</span> <span className="diff-sub-spo">new</span></span> = substitution</span>

    <div className="audio-compare-list">
      {scored.map(score => {
        const clips = audioClips?.[score.unitIndex] ?? {};

                <em style={{ fontWeight: 400, color: '#555' }}>{score.unitText}</em>

function RecordingPanel({ sessionId, selectedStyle, script, onAnalysis }) {
  const [recState, setRecState]       = useState('idle'); // idle | recording | recorded
  const [audioBlob, setAudioBlob]     = useState(null);
  const [audioUrl, setAudioUrl]       = useState(null);
  const [elapsed, setElapsed]         = useState(0);
  const [analyzing, setAnalyzing]     = useState(false);
  const [progress, setProgress]       = useState(null);
  const [validityInfo, setValidityInfo] = useState(null);
  const [error, setError]             = useState(null);
  const mrRef     = useRef(null);
  const timerRef  = useRef(null);
  const chunksRef = useRef([]);

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                     : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
                     : MediaRecorder.isTypeSupported('audio/mp4')  ? 'audio/mp4' : '';
      const mr = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      chunksRef.current = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blobType = mimeType || 'audio/webm';
        const blob = new Blob(chunksRef.current, { type: blobType });
        setAudioBlob(blob);
        setAudioUrl(URL.createObjectURL(blob));
        setRecState('recorded');
      };
      mr.start(200);
      mrRef.current = mr;
      setRecState('recording');
      setElapsed(0);
      timerRef.current = setInterval(() => setElapsed(s => s + 1), 1000);
    } catch (err) {
      setError('Microphone access denied: ' + err.message);
    }
  }

  function stopRecording() {
    mrRef.current?.stop();
    clearInterval(timerRef.current);
  }

  function resetRecording() {
    setRecState('idle');
    setAudioBlob(null);
    setAudioUrl(null);
    setElapsed(0);
    setError(null);
    setProgress(null);
    setValidityInfo(null);
  }

  async function handleAnalyze() {
    if (!audioBlob) return;
    setAnalyzing(true);
    setError(null);
    setProgress({ step: 'Uploading recording…', pct: 2 });
    setValidityInfo(null);

    try {
      const ext = audioBlob.type.includes('mp4') ? '.mp4' : audioBlob.type.includes('ogg') ? '.ogg' : '.webm';
      const form = new FormData();
      form.append('audio', audioBlob, `recording${ext}`);
      form.append('script', script);
      form.append('style', selectedStyle);
      if (sessionId) form.append('sessionId', sessionId);

      const res = await fetch('/api/analyze-user-speech', { method: 'POST', body: form });

      let result = null;
      await consumeSSE(res, (evtName, data) => {
        if (evtName === 'progress') {
          setProgress({ step: data.step, pct: data.pct ?? 0 });
        } else if (evtName === 'audio_ready') {
          setProgress({ step: `Audio validated: ${data.duration?.toFixed(1)}s recording`, pct: 12 });
        } else if (evtName === 'transcription_done') {
          setProgress({ step: `Transcribed ${data.wordCount} words`, pct: 28 });
        } else if (evtName === 'validity_check') {
          setValidityInfo(data);
          const label = data.validity?.replace(/_/g, ' ') ?? '';
          setProgress({ step: `Coverage: ${data.coverage}% — ${label}`, pct: 36 });
        } else if (evtName === 'prosody_done') {
          setProgress({ step: data.quality === 'full' ? 'Pitch analysis complete' : 'Scoring (no pitch)…', pct: 62 });
        } else if (evtName === 'complete') {
          result = data;
        } else if (evtName === 'error') {
          setError(data.message);
        }
      });

      if (result) onAnalysis(result);
    } catch (err) {
      setError(err.message || 'Analysis failed.');
    } finally {
      setAnalyzing(false);
      setProgress(null);
    }
  }

  // Validity inline indicator shown while analyzing
  const validityBannerCls = validityInfo
    ? validityInfo.validity === 'catastrophic_script_mismatch' ? 'bad'
    : validityInfo.validity === 'major_script_mismatch' ? 'warn'
    : 'ok'
    : null;

  return (
    <div>
      <div className="card">
        <div className="card-title">The Script — Read This Aloud</div>
        <div className="script-readonly">{script}</div>
      </div>

      <div className="card">
        <div className="card-title">Your Recording</div>

        {recState === 'idle' && (
          <div className="record-area">
            <button className="btn-record idle" onClick={startRecording}>🎙</button>
            <div className="rec-hint">Click to start recording</div>
          </div>
        )}

        {recState === 'recording' && (
          <div className="record-area">
            <button className="btn-record recording" onClick={stopRecording}>⏹</button>
            <div className="rec-timer">{fmtTime(elapsed)}</div>
            <div className="rec-hint">Recording… click to stop</div>
          </div>
        )}

        {recState === 'recorded' && (
          <div style={{ padding: '8px 0' }}>
            <div className="recorded-row" style={{ marginBottom: 14 }}>
              <audio controls src={audioUrl} />
            </div>
            {!analyzing && !progress && (
              <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                <button className="btn-analyze" onClick={handleAnalyze}>
                  Analyze My Speech
                </button>
                <button className="btn-rerecord" onClick={resetRecording}>
                  Re-record
                </button>
              </div>
            )}
            {(analyzing || progress) && (
              <div className="card progress-card" style={{ marginTop: 12, marginBottom: 0 }}>
                <div className="progress-step">{progress?.step ?? 'Analyzing…'}</div>
                <div className="progress-bar-wrap">
                  <div className="progress-bar" style={{ width: `${progress?.pct ?? 0}%` }} />
                </div>
                <div className="progress-meta">{progress?.pct ?? 0}%</div>
                {validityInfo && validityBannerCls && (
                  <div className={`validity-inline ${validityBannerCls}`} style={{ marginTop: 10 }}>
                    {validityInfo.validity === 'catastrophic_script_mismatch'
                      ? `⚠ Only ${validityInfo.coverage}% of the script was detected. Score will be capped at ${validityInfo.maxOverall}.`
                      : validityInfo.validity === 'major_script_mismatch'
                      ? `Coverage: ${validityInfo.coverage}% — some sections missing. Score capped at ${validityInfo.maxOverall}.`
                      : `✓ Coverage: ${validityInfo.coverage}% — scoring all dimensions.`
                    }
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {error && <div className="error-box" style={{ marginTop: 12 }}><strong>Error:</strong> {error}</div>}
      </div>
    </div>
  );
}

function SpeechLab({ sessionId, selectedStyle, setSelectedStyle, script, scriptDrifted, audioStatus, analysis, setAnalysis }) {
  const prosodyReady = audioStatus?.prosodyReady ?? null;

  return (
    <div>
      {prosodyReady === false && (
        <div className="warn-box setup-warn">
          ⚙️ Pitch analysis (librosa) is not ready — expression scoring will be skipped.
          Run <code>npm run setup:analysis</code> in your terminal to install Python dependencies, then restart the server.
        </div>
      )}

      {!sessionId && (
        <div className="info-box">
          💡 Generate a reference audio first (Reference Generator tab) to unlock beat-map comparison.
          You can still record and analyze without it.
        </div>
      )}

      {scriptDrifted && (
        <div className="warn-box">
          ⚠ Script changed since you generated the reference. The analysis will use your original locked script.
          Click <strong>Generate</strong> again if you want to update to the new version.
        </div>
      )}

      <div className="card" style={{ marginBottom: 18 }}>
        <div className="card-title">Settings</div>
        <div className="controls-row">
          <div className="select-group">
            <span className="select-label">Compare against</span>
            <select value={selectedStyle} onChange={e => setSelectedStyle(e.target.value)} disabled={!sessionId}>
              {MODES.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
            </select>
          </div>
          {sessionId && <div style={{ fontSize: '0.78rem', color: '#888', paddingBottom: 4 }}>Session: {sessionId.slice(0,8)}</div>}
        </div>
      </div>

      <RecordingPanel
        sessionId={sessionId}
        selectedStyle={selectedStyle}
        script={script}
        onAnalysis={setAnalysis}
      />

      {analysis && <AnalysisResults analysis={analysis} />}
    </div>
  );
}

/* ──────────────────────────────── App ───────────────────────────── */

function App() {
  const [activeTab, setActiveTab]   = useState('reference');

  // Reference Generator state
  const [text, setText]             = useState(DEFAULT_SCRIPT);
  const [voice, setVoice]           = useState('marin');
  const [mode, setMode]             = useState('emotional');
  const [threeTakes, setThreeTakes] = useState(true);
  const [loading, setLoading]       = useState(false);
  const [progress, setProgress]     = useState(null);
  const [activeTake, setActiveTake] = useState(-1);
  const [takes, setTakes]           = useState({});
  const [meta, setMeta]             = useState(null);
  const [error, setError]           = useState(null);
  const [expanded, setExpanded]     = useState({});
  const [regenLoading, setRegenLoading] = useState({});

  // Speech Lab state
  const [selectedStyle, setSelectedStyle] = useState('emotional');
  const [analysis, setAnalysis]           = useState(null);
  const [frozenScript, setFrozenScript]   = useState(null);
  const [audioStatus, setAudioStatus]     = useState(null);

  // Check audio/prosody status on mount
  useEffect(() => {
    fetch('/api/health/audio')
      .then(r => r.json())
      .then(setAudioStatus)
      .catch(() => {});
  }, []);

  // Script that's locked to the current session
  const effectiveScript = frozenScript ?? text;
  const scriptDrifted   = frozenScript !== null && text.trim() !== frozenScript;

  const charCount = text.length;
  const charClass = charCount > 2500 ? 'over' : charCount > 2000 ? 'warn' : '';
  const generatingStyles = threeTakes ? TAKE_STYLES : [mode];

  function toggleSection(style, section) {
    setExpanded(prev => ({ ...prev, [style]: prev[style] === section ? null : section }));
  }

  function handleSSEEvent(evtName, data) {
    if (evtName === 'progress') {
      setActiveTake(data.takeIndex ?? 0);
      setProgress(prev => ({
        step: data.step, phase: data.phase,
        takeIndex: data.takeIndex ?? prev?.takeIndex ?? 0,
        takeTotal: data.takeTotal ?? prev?.takeTotal ?? 1,
        segments: data.phase === 'tts' ? 0 : (prev?.segments ?? 0),
        segTotal: data.segmentTotal ?? (prev?.segTotal ?? 0),
      }));
    } else if (evtName === 'segment_done') {
      setProgress(prev => prev ? { ...prev, segments: data.completed, segTotal: data.total } : prev);
    } else if (evtName === 'take_done') {
      setTakes(prev => ({
        ...prev,
        [data.style || generatingStyles[data.takeIndex]]: {
          ...(prev[data.style || generatingStyles[data.takeIndex]] ?? {}),
          audioUrl: data.audioUrl, diagnostics: data.diagnostics, name: data.takeName,
        },
      }));
    } else if (evtName === 'complete') {
      setMeta({ voice: data.voice, model: data.model, textModel: data.textModel, sessionId: data.sessionId, files: data.generatedFiles });
      // Freeze the script for Speech Lab
      setFrozenScript(text.trim());
      for (const t of data.takes) {
        setTakes(prev => ({ ...prev, [t.style]: { ...(prev[t.style] ?? {}), ...t } }));
      }
    } else if (evtName === 'error') {
      setError(data.message);
    }
  }

  async function handleGenerate() {
    setLoading(true); setError(null); setTakes({}); setMeta(null); setActiveTake(-1);
    setProgress({ step: 'Starting…', phase: null, takeIndex: 0, takeTotal: threeTakes ? 3 : 1, segments: 0, segTotal: 0 });
    try {
      const res = await fetch('/api/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, voice, mode, takeCount: threeTakes ? 3 : 1 }),
      });
      await consumeSSE(res, handleSSEEvent);
    } catch (err) {
      setError(err.message || 'Generation failed.');
    } finally {
      setLoading(false); setProgress(null);
    }
  }

  async function handleRegenerate(style) {
    setRegenLoading(prev => ({ ...prev, [style]: true })); setError(null);
    try {
      const res = await fetch('/api/regenerate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, voice, style }),
      });
      await consumeSSE(res, (evtName, data) => {
        if (evtName === 'complete') {
          const t = data.takes[0];
          setTakes(prev => ({ ...prev, [t.style]: { ...t, isRegenerated: true } }));
        } else if (evtName === 'error') setError(data.message);
      });
    } catch (err) {
      setError(err.message || 'Regeneration failed.');
    } finally {
      setRegenLoading(prev => ({ ...prev, [style]: false }));
    }
  }

  const progressPct = (() => {
    if (!progress || !loading) return 0;
    const { phase, takeIndex, takeTotal, segments, segTotal } = progress;
    const perTake = 100 / takeTotal;
    const base = takeIndex * perTake;
    let within = 0;
    if (phase === 'beat_map') within = 0.05;
    else if (phase === 'tts') within = 0.08 + (segTotal > 0 ? (segments / segTotal) * 0.68 : 0);
    else if (phase === 'compose') within = 0.78;
    else if (phase === 'master')  within = 0.92;
    return Math.min(99, base + within * perTake);
  })();

  const displayStyles = Object.keys(takes);

  return (
    <div className="container">
      <div className="header">
        <h1>Vaani Reference Delivery POC</h1>
        <div className="sub">World-class Steve Jobs-inspired product keynote performance · Performance Director V2</div>
        <span className="disclaimer">Steve Jobs-inspired delivery profile — not a voice clone or impersonation</span>
      </div>

      <div className="top-tabs">
        <button className={`top-tab ${activeTab==='reference'?'active':''}`} onClick={() => setActiveTab('reference')}>
          Reference Generator
        </button>
        <button className={`top-tab ${activeTab==='speechlab'?'active':''}`} onClick={() => setActiveTab('speechlab')}>
          Speech Lab {analysis ? '✓' : ''}
        </button>
      </div>

      {/* ── Reference Generator ── */}
      {activeTab === 'reference' && (
        <div>
          <div className="card">
            <div className="card-title">Speech</div>
            <textarea value={text} onChange={e => setText(e.target.value)} disabled={loading}
              placeholder="Paste your speech here…" />
            <div className="char-row">
              <span className={`char-count ${charClass}`}>{charCount.toLocaleString()} / 2,500</span>
            </div>
            <div className="controls-row">
              <div className="select-group">
                <span className="select-label">Voice</span>
                <select value={voice} onChange={e => setVoice(e.target.value)} disabled={loading}>
                  {VOICES.map(v => <option key={v.value} value={v.value}>{v.label}</option>)}
                </select>
              </div>
              <div className="select-group">
                <span className="select-label">Mode{threeTakes?' (all 3)':''}</span>
                <select value={mode} onChange={e => setMode(e.target.value)} disabled={loading||threeTakes}>
                  {MODES.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                </select>
              </div>
              <label className="check-group">
                <input type="checkbox" checked={threeTakes} onChange={e => setThreeTakes(e.target.checked)} disabled={loading} />
                <span>Generate 3 takes (Restrained · Emotional · Launch)</span>
              </label>
              <div className="spacer" />
              <button className="btn-primary" onClick={handleGenerate} disabled={loading||charCount>2500||!text.trim()}>
                {loading ? 'Generating…' : 'Generate World-Class MP3'}
              </button>
            </div>
          </div>

          {error && <div className="error-box"><strong>Error:</strong> {error}</div>}

          {loading && progress && (
            <div className="card progress-card">
              <div className="card-title">Generating · Performance Director V2</div>
              <div className="take-pills">
                {generatingStyles.map((style,i) => (
                  <span key={style} className={`take-pill ${i<activeTake?'done':i===activeTake?'active':''}`}>
                    Take {TAKE_LABEL[style]}
                  </span>
                ))}
              </div>
              <div className="progress-step">{progress.step}</div>
              <div className="progress-bar-wrap">
                <div className="progress-bar" style={{ width: `${progressPct}%` }} />
              </div>
              <div className="progress-meta">
                {progress.phase==='tts' && progress.segTotal>0 &&
                  <span>Units: {progress.segments}/{progress.segTotal} · </span>}
                <span>Take {(progress.takeIndex??0)+1} of {progress.takeTotal}</span>
              </div>
            </div>
          )}

          {displayStyles.length > 0 && (
            <>
              {meta && (
                <div className="meta-row">
                  <span><strong>TTS:</strong> {meta.model}</span>
                  <span><strong>Text:</strong> {meta.textModel}</span>
                  <span><strong>Voice:</strong> {meta.voice}</span>
                  <span><strong>Session:</strong> {meta.sessionId?.slice(0,8)}</span>
                  {meta.sessionId && (
                    <button className="btn-secondary" style={{ marginLeft: 'auto' }}
                      onClick={() => { setSelectedStyle(mode); setActiveTab('speechlab'); }}>
                      → Go to Speech Lab
                    </button>
                  )}
                </div>
              )}
              {(threeTakes ? TAKE_STYLES : [mode]).map((style,i) => {
                const take = takes[style];
                if (!take) return null;
                return (
                  <TakeCard key={style} take={take} takeIdx={i} text={text} voice={voice}
                    expanded={expanded[style]} onToggle={s => toggleSection(style, s)}
                    isRegenerating={!!regenLoading[style]} onRegenerate={handleRegenerate} />
                );
              })}
              {meta?.files && (
                <div className="card">
                  <div className="card-title">Generated Files</div>
                  <ul className="files-list">
                    {meta.files.map(f => <li key={f}><a href={f} download>{f}</a></li>)}
                  </ul>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ── Speech Lab ── */}
      {activeTab === 'speechlab' && (
        <SpeechLab
          sessionId={meta?.sessionId}
          selectedStyle={selectedStyle}
          setSelectedStyle={setSelectedStyle}
          script={effectiveScript}
          scriptDrifted={scriptDrifted}
          audioStatus={audioStatus}
          analysis={analysis}
          setAnalysis={setAnalysis}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
