name: reusable-python-api

# Reusable quality workflow for the POC FastAPI backend (services/api).
# Wired into ci.yml. Covers: install, lint, format-check, unit tests, coverage gate.
on:
  workflow_call: {}

jobs:
  api-quality:
    name: API (FastAPI) Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend deps
        run: pip install -r services/api/requirements.txt

      - name: Ruff lint
        run: ruff check services/api/

      - name: Black format check
        run: black --check services/api/

      - name: Unit tests + coverage gate (>=70%)
        run: |
          pytest services/api/tests -m "not integration" \
            --cov=services/api \
            --cov-config=services/api/.coveragerc \
            --cov-report=term-missing
