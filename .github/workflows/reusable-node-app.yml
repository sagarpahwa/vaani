name: reusable-node-app

# Reusable quality workflow for the POC Expo app (app/).
# Runs install + lint + typecheck + test. Tolerates the app/ not yet existing
# (kept valid + green before the scaffold landed).
on:
  workflow_call: {}

jobs:
  app-quality:
    name: App (Expo) Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run app checks (or skip until scaffolded)
        run: |
          if [ -f app/package.json ]; then
            cd app
            npm ci
            npm run lint
            npm run typecheck
            npm test -- --watchAll=false --passWithNoTests
          else
            echo "app/ not scaffolded yet (POC milestone P5) — skipping."
          fi
