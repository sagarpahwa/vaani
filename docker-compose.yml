version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: vaani_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-vaani_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-vaani_secret}
      MONGO_INITDB_DATABASE: public_speaking_intelligence
    volumes:
      - vaani_mongo_data:/data/db
      - vaani_mongo_config:/data/configdb
      - ./logs/mongo:/var/log/mongodb
    command: ["mongod", "--auth", "--logpath", "/var/log/mongodb/mongod.log", "--logappend"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: vaani_mongo_express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-vaani_admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-vaani_secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-vaani_admin}:${MONGO_ROOT_PASS:-vaani_secret}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"

volumes:
  vaani_mongo_data:
    name: vaani_mongo_data
  vaani_mongo_config:
    name: vaani_mongo_config
